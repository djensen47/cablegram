name: CI

# Runs on every PR (plus pushes to main, so a merge is verified too).
# No live database: tests use InMemory<X>Repository doubles (see CLAUDE.md).
# Persistence is the native MongoDB driver (ADR-012) — no codegen/generate step.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (includes eslint-plugin-boundaries, ADR-005)
        run: npm run lint

      - name: Test
        run: npm test
